name: CI

on:
  push:
    branches: [main]
  # No branches filter: stacked PRs (base = another feature branch) must get
  # the same compile/lint/test coverage as PRs into main. A base-branch filter
  # here meant stacked PRs ran zero CI (bit PR #316).
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MIX_ENV: test
  # Pinned to a stable release that satisfies `elixir ~> 1.15`. The repo builds
  # locally on edge 1.20.x, but CI uses a stable toolchain for reproducibility.
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "27"

jobs:
  build:
    name: Compile, lint, scan & test
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector, not plain postgres: `KilnCMS.Repo.installed_extensions/0`
        # requires the `vector` extension (semantic-search embeddings) even
        # though the feature is disabled by default, so `ash.setup`/`mix test`
        # fail on plain postgres:16 with "extension \"vector\" is not available".
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache Dialyzer PLTs
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check unused deps are unlocked
        run: mix deps.unlock --check-unused

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      # NOTE (#419): the migration/snapshot drift check moved to the
      # strict_tenancy job — snapshots are generated from the STRICT build
      # (the canonical prod schema: org-composite FKs), which this fail-open
      # test build would mis-diff.

      - name: Check the core ships no downstream project schema
        # Fails if a migrated table or a resource snapshot has no backing Ash
        # resource in a registered domain — i.e. a downstream project's schema
        # leaked into the reusable core. This is what would have caught #288's
        # leftover herbs/formulas tables and the #290 index migrations, both of
        # which the rest of the suite happily passed. Needs the DB, so it leans
        # on the migrations the `test` alias applies.
        run: mix test test/kiln/core_agnostic_test.exs

      - name: Check formatting
        run: mix format --check-formatted

      - name: Credo
        run: mix credo --strict

      - name: Sobelow (security scan)
        run: mix sobelow --config

      - name: Run tests
        run: mix test

      - name: Dialyzer
        run: mix dialyzer

  client:
    name: Elixir client (kiln_client)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: clients/elixir/kiln_client

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            clients/elixir/kiln_client/deps
            clients/elixir/kiln_client/_build
          key: ${{ runner.os }}-client-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('clients/elixir/kiln_client/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-client-mix-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  e2e:
    name: Browser E2E (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector, not plain postgres: `KilnCMS.Repo.installed_extensions/0`
        # requires the `vector` extension (semantic-search embeddings) even
        # though the feature is disabled by default, so `ash.setup`/`mix test`
        # fail on plain postgres:16 with "extension \"vector\" is not available".
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache deps and _build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-e2e-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-e2e-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package.json') }}

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Install E2E dependencies + browser
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Compile the app in MIX_ENV=e2e up front, as a normal (uncapped) step, so
      # the potentially-cold dep build lands in the cached _build BEFORE
      # Playwright starts. Otherwise this compile runs inside the webServer
      # command below, whose 300s startup budget a cold e2e compile blows.
      - name: Compile app (MIX_ENV=e2e)
        run: MIX_ENV=e2e mix compile

      # Playwright's webServer builds assets, sets up the kiln_cms_e2e DB +
      # demo seeds (mix e2e.setup), then serves (PHX_SERVER=true). With the app
      # already compiled above, startup stays well inside the timeout. See
      # e2e/playwright.config.js.
      - name: Run Playwright suite
        working-directory: e2e
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  # Strict-tenancy smoke (#419): compile fail-closed (KILN_STRICT_TEST=1 is a
  # COMPILE-TIME config in config/test.exs) in its own build dir and run only
  # the @moduletag :strict_tenancy suite — the main suite exercises the
  # fail-open build above.
  strict_tenancy:
    name: Strict-tenancy smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      KILN_STRICT_TEST: "1"
      MIX_BUILD_PATH: _build/test_strict
      MIX_TEST_PARTITION: strict

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache deps and strict build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build/test_strict
          key: strict-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}

      - name: Install dependencies
        # local.rebar explicitly: this job has no warm _build cache on first
        # runs and gproc's rebar3 compile failed without the bootstrap.
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get

      - name: Check for migration/snapshot drift (strict build)
        # Snapshots are generated from the strict build — the canonical prod
        # schema (org-composite FKs) — so the drift check lives here (#419).
        run: mix ash.codegen --check

      - name: Run the strict smoke suite
        run: mix test test/kiln_cms/strict_tenancy_test.exs
